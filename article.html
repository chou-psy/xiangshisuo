<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章｜香識所 × 周欣儀</title>
  <meta name="description" content="周欣儀諮商心理師的香識所文章。結合嗅覺心理學與心理諮商，探索氣味、記憶與情緒的深層連結。" />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="香識所｜周欣儀" />
  <meta property="og:title" content="文章｜香識所 × 周欣儀" />
  <meta property="og:description" content="周欣儀諮商心理師的香識所文章。結合嗅覺心理學與心理諮商，探索氣味、記憶與情緒的深層連結。" />
  <meta property="og:url" content="https://chou-psy.github.io/xiangshisuo/article.html" />
  <link rel="icon" type="image/png" sizes="64x64" href="https://chou-psy.github.io/xiangshisuo/favicon.png" />
  <link rel="shortcut icon" href="https://chou-psy.github.io/xiangshisuo/favicon.png" />
  <meta property="og:image" content="https://chou-psy.github.io/xiangshisuo/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0e0c0a;
      --bg-mid: #161310;
      --gold-bright: #d4a96a;
      --gold-dim: #b8965a;
      --gold-pale: #e8d5b0;
      --off-white: #e8dcc8;
      --fog: #a89880;
      --mist: #c8bfb0;
      --divider: rgba(184,150,90,0.18);
    }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(to right, var(--gold-dim), var(--gold-bright));
      z-index: 200;
      transition: width 0.1s linear;
    }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--off-white);
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      line-height: 1.85;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      background: rgba(14,12,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--divider);
    }

    .nav-logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: var(--gold-dim);
      text-decoration: none;
    }

    .nav-back {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--fog);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-back:hover { color: var(--gold-bright); }

    /* ARTICLE */
    .article-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2.4rem;
    }

    .article-tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--gold-dim);
      border: 1px solid var(--divider);
      padding: 0.3rem 0.8rem;
    }

    .article-date {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--fog);
    }

    .article-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 2rem;
      color: var(--off-white);
    }

    .article-divider {
      width: 3rem;
      height: 1px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
      margin-bottom: 2.5rem;
    }

    .article-body {
      font-size: 1rem;
      color: var(--mist);
      letter-spacing: 0.04em;
      line-height: 2.1;
    }

    .article-body p {
      margin-bottom: 1.6rem;
    }

    .article-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .article-footer-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--fog);
    }

    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--gold-bright); }

    /* COPY TOAST */
    .copy-toast {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: rgba(28,24,20,0.95);
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      padding: 0.6rem 1.4rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* HOME BUTTON */
    #home-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 2.6rem;
      height: 2.6rem;
      border: 1px solid var(--divider);
      background: rgba(14,12,10,0.85);
      backdrop-filter: blur(8px);
      color: var(--gold-dim);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, border-color 0.3s;
      z-index: 99;
      text-decoration: none;
    }

    #home-btn.show { opacity: 1; pointer-events: auto; }
    #home-btn:hover { border-color: var(--gold-bright); }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      .article-wrap { padding: 7rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">香識所｜周欣儀</a>
  <a class="nav-back" href="#" onclick="history.back(); return false;" aria-hidden="true">← 返回上一頁</a>
</nav>

<div class="copy-toast" id="copy-toast" aria-hidden="true">連結已複製</div>
<a href="index.html" id="home-btn" aria-label="返回首頁" title="返回首頁">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M1 7L8 1L15 7V14.5C15 14.8 14.8 15 14.5 15H10.5V10.5H5.5V15H1.5C1.2 15 1 14.8 1 14.5V7Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>
</a>

<div class="article-wrap" id="article-content">
  <div id="seo-fallback" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
    <h1>香識所文章｜周欣儀諮商心理師</h1>
    <p>結合嗅覺心理學與心理諮商，探索氣味、記憶與情緒的深層連結。</p>
  </div>
</div>

<script src="articles.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const article = ARTICLES.find(a => a.id === id);

  if (article) {
    document.title = article.title + '｜香識所';

    // 動態 meta description
    let metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) {
      metaDesc = document.createElement('meta');
      metaDesc.setAttribute('name', 'description');
      document.head.appendChild(metaDesc);
    }
    metaDesc.setAttribute('content', article.summary);

    // OG tags
    let ogTitle = document.querySelector('meta[property="og:title"]');
    if (!ogTitle) { ogTitle = document.createElement('meta'); ogTitle.setAttribute('property','og:title'); document.head.appendChild(ogTitle); }
    ogTitle.setAttribute('content', article.title + '｜香識所');

    let ogDesc = document.querySelector('meta[property="og:description"]');
    if (!ogDesc) { ogDesc = document.createElement('meta'); ogDesc.setAttribute('property','og:description'); document.head.appendChild(ogDesc); }
    ogDesc.setAttribute('content', article.summary);

    const paragraphs = article.content
      .split('\n\n')
      .filter(p => p.trim())
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('');

    // 上下篇導航（同 category）
    const sameCategory = ARTICLES.filter(a => a.category === article.category);
    const currentIndex = sameCategory.findIndex(a => a.id === article.id);
    const prevArticle = sameCategory[currentIndex - 1] || null;
    const nextArticle = sameCategory[currentIndex + 1] || null;

    const prevNextHTML = (prevArticle || nextArticle) ? `
      <div style="margin-top:3.5rem; padding-top:2rem; border-top:1px solid var(--divider); display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <div style="flex:1; min-width:0;">
          ${prevArticle ? `
            <a href="article.html?id=${prevArticle.id}" style="text-decoration:none; display:block; padding:1.2rem; border:1px solid var(--divider); transition:border-color 0.3s;" onmouseover="this.style.borderColor='var(--gold-dim)'" onmouseout="this.style.borderColor='var(--divider)'">
              <p style="font-size:0.62rem; letter-spacing:0.2em; color:var(--fog); margin-bottom:0.4rem;">← 上一篇</p>
              <p style="font-size:0.85rem; color:var(--off-white); letter-spacing:0.04em; line-height:1.5;">${prevArticle.title}</p>
            </a>
          ` : ''}
        </div>
        <div style="flex:1; min-width:0; text-align:right;">
          ${nextArticle ? `
            <a href="article.html?id=${nextArticle.id}" style="text-decoration:none; display:block; padding:1.2rem; border:1px solid var(--divider); transition:border-color 0.3s;" onmouseover="this.style.borderColor='var(--gold-dim)'" onmouseout="this.style.borderColor='var(--divider)'">
              <p style="font-size:0.62rem; letter-spacing:0.2em; color:var(--fog); margin-bottom:0.4rem;">下一篇 →</p>
              <p style="font-size:0.85rem; color:var(--off-white); letter-spacing:0.04em; line-height:1.5;">${nextArticle.title}</p>
            </a>
          ` : ''}
        </div>
      </div>
    ` : '';

    // 相關文章
    const related = ARTICLES
      .filter(a => a.id !== article.id && a.category === article.category)
      .slice(0, 3);

    const relatedHTML = related.length > 0 ? `
      <div style="margin-top:3.5rem; padding-top:2rem; border-top:1px solid var(--divider);">
        <p style="font-size:0.68rem; letter-spacing:0.25em; color:var(--gold-dim); margin-bottom:1.5rem;">相關文章</p>
        <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem;">
          ${related.map(a => `
            <a href="article.html?id=${a.id}" style="text-decoration:none; border:1px solid var(--divider); padding:1.2rem; display:block; transition:border-color 0.3s;" onmouseover="this.style.borderColor='var(--gold-dim)'" onmouseout="this.style.borderColor='var(--divider)'">
              <p style="font-size:0.62rem; letter-spacing:0.2em; color:var(--gold-dim); margin-bottom:0.5rem;">${a.tag}</p>
              <p style="font-size:0.85rem; color:var(--off-white); letter-spacing:0.04em; line-height:1.5;">${a.title}</p>
            </a>
          `).join('')}
        </div>
      </div>
    ` : '';

    // 分享按鈕
    const shareHTML = `
      <div style="margin-top:2rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
        <button id="copy-btn"
          style="background:transparent; border:1px solid var(--divider); color:var(--fog); padding:0.5rem 1.2rem; font-family:'Noto Serif TC',serif; font-size:0.72rem; letter-spacing:0.15em; cursor:pointer; transition:all 0.3s;"
          onmouseover="this.style.borderColor='var(--gold-dim)';this.style.color='var(--gold-dim)'"
          onmouseout="this.style.borderColor='var(--divider)';this.style.color='var(--fog)'">
          複製連結
        </button>
        <button id="line-share-btn"
          style="background:transparent; border:1px solid var(--divider); color:var(--fog); padding:0.5rem 1.2rem; font-family:'Noto Serif TC',serif; font-size:0.72rem; letter-spacing:0.15em; cursor:pointer; transition:all 0.3s; display:inline-flex; align-items:center; gap:0.4rem;"
          onmouseover="this.style.borderColor='var(--gold-dim)';this.style.color='var(--gold-dim)'"
          onmouseout="this.style.borderColor='var(--divider)';this.style.color='var(--fog)'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          分享至 LINE
        </button>
      </div>
    `;

    // JSON-LD structured data
    const jsonLD = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": article.title,
      "description": article.summary,
      "author": {
        "@type": "Person",
        "name": "周欣儀",
        "jobTitle": "諮商心理師",
        "url": "https://chou-psy.github.io/xiangshisuo/"
      },
      "publisher": {
        "@type": "Organization",
        "name": "香識所",
        "url": "https://chou-psy.github.io/xiangshisuo/"
      },
      "url": window.location.href,
      "inLanguage": "zh-Hant"
    };
    const ldScript = document.createElement('script');
    ldScript.type = 'application/ld+json';
    ldScript.textContent = JSON.stringify(jsonLD);
    document.head.appendChild(ldScript);

    document.getElementById('article-content').innerHTML = `
      <div class="article-meta">
        <span class="article-tag">${article.tag}</span>
        <span class="article-date" style="letter-spacing:0.2em;">${article.categoryLabel}</span>
      </div>
      <h1 class="article-title">${article.title}</h1>
      <div class="article-divider"></div>
      <div class="article-body">${paragraphs}</div>
      ${shareHTML}
      <div class="article-footer" style="margin-top:2rem;">
        <span class="article-footer-label">香識所 × 周欣儀</span>
      </div>
      ${prevNextHTML}
      ${relatedHTML}
    `;
  } else {
    document.getElementById('article-content').innerHTML = `
      <p style="color:var(--fog); letter-spacing:0.1em;">找不到這篇文章。</p>
      <a class="back-link" href="index.html" style="display:inline-block;margin-top:2rem;">← 返回首頁</a>
    `;
  }
</script>

<div id="progress-bar"></div>

<script>
  const bar = document.getElementById('progress-bar');
  const homeBtn = document.getElementById('home-btn');
  const toast = document.getElementById('copy-toast');

  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
    if (homeBtn) {
      if (scrollTop > 300) homeBtn.classList.add('show');
      else homeBtn.classList.remove('show');
    }
  }, { passive: true });

  // 複製連結 toast
  document.addEventListener('click', function(e) {
    const target = e.target.closest('button');
    if (!target) return;
    if (target.id === 'copy-btn') {
      navigator.clipboard.writeText(window.location.href).then(() => {
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
    if (target.id === 'line-share-btn') {
      const lineURL = 'https://line.me/R/msg/text/?' + encodeURIComponent(window.location.href);
      window.open(lineURL, '_blank', 'noopener,noreferrer');
    }
  });
</script>

</body>
</html>
