<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章｜香識所 × 周欣儀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0e0c0a;
      --bg-mid: #161310;
      --gold-bright: #d4a96a;
      --gold-dim: #b8965a;
      --gold-pale: #e8d5b0;
      --off-white: #e8dcc8;
      --fog: #a89880;
      --mist: #c8bfb0;
      --divider: rgba(184,150,90,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--off-white);
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      line-height: 1.85;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      background: rgba(14,12,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--divider);
    }

    .nav-logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: var(--gold-dim);
      text-decoration: none;
    }

    .nav-back {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--fog);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-back:hover { color: var(--gold-bright); }

    /* ARTICLE */
    .article-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2.4rem;
    }

    .article-tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--gold-dim);
      border: 1px solid var(--divider);
      padding: 0.3rem 0.8rem;
    }

    .article-date {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--fog);
    }

    .article-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 2rem;
      color: var(--off-white);
    }

    .article-divider {
      width: 3rem;
      height: 1px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
      margin-bottom: 2.5rem;
    }

    .article-body {
      font-size: 1rem;
      color: var(--mist);
      letter-spacing: 0.04em;
      line-height: 2.1;
    }

    .article-body p {
      margin-bottom: 1.6rem;
    }

    .article-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .article-footer-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--fog);
    }

    .back-link {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--gold-bright); }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      .article-wrap { padding: 7rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">香識所｜周欣儀</a>
  <a class="nav-back" href="index.html">← 返回首頁</a>
</nav>

<div class="article-wrap" id="article-content">
  <!-- 由 JS 填入 -->
</div>

<script>
  const ARTICLES = [
  {
    id: "nervous-system-relax",
    category: "scent",
    categoryLabel: "香識所",
    tag: "神經系統 × 嗅覺",
    title: "有些人的身體，已經忘記放鬆是什麼感覺了",
    date: "2026",
    summary: "長期壓力讓皮質醇持續偏高，神經系統陷入慢性過度警戒。",
    content: `有些人的身體，已經忘記放鬆是什麼感覺了。

睡了一覺醒來，肩頸還是緊的。沒有特別發生什麼事，就是隱隱覺得哪裡不對。這種狀態持續久了，人會開始以為這就是正常。

長期壓力會讓皮質醇長時間維持在高點，神經系統陷入一種慢性的過度警戒。疲憊，卻難以真正休息。這是生理狀態的問題。

嗅覺在這裡有一個特殊的位置。研究發現，嗅覺訊號進入大腦後，可以透過神經迴路影響 HPA 軸的起點，也就是下視丘的活動。氣味是少數能從這個位置參與調節壓力反應的感官刺激。

當某個穩定的氣味，反覆出現在你平靜的時刻，大腦會慢慢學會把那個訊號和放鬆的狀態連結在一起。那個氣味，最終可以成為一種提示。提醒過度警戒的神經系統，現在可以稍微鬆開了。

身體比我們想像的更願意被安撫。`
  },
  {
    id: "cat-scent-attachment",
    category: "scent",
    categoryLabel: "香識所",
    tag: "動物行為 × 氣味依附",
    title: "你靠著他的氣味安心，他靠著你的氣味確認這裡可以待下來",
    date: "2026",
    summary: "2025年東京農業大學研究發現，貓嗅聞陌生人氣味的時間是主人的兩倍以上。",
    content: `我喜歡抱著我的貓睡覺，因為他身上有一股讓我安心的氣味。

直到某一天突然想到，有沒有可能他靠近我，大概也是同樣的原因？

2025年5月，東京農業大學的研究團隊在 PLOS One 發表了一項實驗。他們讓三十隻貓分別嗅聞主人的氣味、陌生人的氣味，以及沒有任何氣味的棉花棒。結果是：貓咪嗅聞陌生人氣味的時間，平均是嗅聞主人的兩倍以上。

研究者的解讀是，主人的氣味對貓來說已經不需要確認，它早已成為一種熟悉的背景。

貓從幼年開始就靠氣味定位安全的地方。幼貓在陌生環境中，嗅到母親的氣味會明顯平靜下來，這個機制在成年後並沒有消失，只是換了對象。

你靠著他的氣味安心。他靠著你的氣味，確認這裡可以待下來。`
  }
];
</script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const article = ARTICLES.find(a => a.id === id);

  if (article) {
    document.title = article.title + '｜香識所';

    const paragraphs = article.content
      .split('\n\n')
      .filter(p => p.trim())
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('');

    document.getElementById('article-content').innerHTML = `
      <div class="article-meta">
        <span class="article-tag">${article.tag}</span>
        <span class="article-date">${article.categoryLabel}</span>
      </div>
      <h1 class="article-title">${article.title}</h1>
      <div class="article-divider"></div>
      <div class="article-body">${paragraphs}</div>
      <div class="article-footer">
        <span class="article-footer-label">香識所 × 周欣儀</span>
        <a class="back-link" href="index.html">← 返回首頁</a>
      </div>
    `;
  } else {
    document.getElementById('article-content').innerHTML = `
      <p style="color:var(--fog); letter-spacing:0.1em;">找不到這篇文章。</p>
      <a class="back-link" href="index.html" style="display:inline-block;margin-top:2rem;">← 返回首頁</a>
    `;
  }
</script>

</body>
</html>
