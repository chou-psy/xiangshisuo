他們讓33位 PTSD 患者接受 EMDR 治療，治療結束後當晚，在患者深層睡眠期間播放 EMDR 過程中使用的聲音提示。

研究結果顯示，接受這個刺激的患者，睡眠中負責記憶鞏固的腦波活動明顯增加，而且這個增加程度和 PTSD 症狀的減輕有相關。在「迴避行為」這個指標上，也觀察到顯著改善。

研究者把這個方法叫做「目標記憶再活化」（targeted memory reactivation）。概念是：治療過程中被修改過的記憶，需要睡眠來幫它穩固下來。

這個研究只有33人，作者明確說是概念驗證階段。整體 PTSD 症狀的改善在統計上還不夠顯著，後續需要更大規模的研究。

但它指向一件我相信的事：諮商室裡發生的改變，離開之後還在繼續。

    summary: "投射性認同不是操控，也不是故意。而是一個人承受不了內在的焦慮，把它「丟出去」，而我們在互動裡真的開始「替他感受」。",
    content: `有些時候，我們在關係裡感到一種很奇怪的疲累：原本沒那麼緊張，卻在對方面前突然焦躁；明明沒有生氣，卻被對方的語氣逼到像在替他發火；甚至在一場談話後，莫名背起罪惡感，好像自己做錯了什麼。

這種「被推進某種情緒角色」的感受，心理學稱為投射性認同。

它不是操控，也不是故意。而是一個人承受不了內在的焦慮、羞愧或憤怒，把它「丟出去」，而我們在互動裡真的開始「替他感受」。

例如：一個明明焦慮的人，一直問你會不會出錯，久而久之，你變得比他還緊張。一個其實在生氣的人沒有承認，但語氣處處帶刺，結果你開始替他感到不安、道歉、或覺得自己做不好。一個害怕的小孩黏著大人，反覆尋求安撫，最後倒是大人變得心慌，像承受了孩子的無助。

投射性認同最微妙的地方是：這不是你的情緒，卻變成你正在感受的情緒。

如果你在某段關係裡常常感到突然的不安、難以解釋的罪惡感、莫名的緊張、被迫扮演某種角色，或談話後渾身累得像替別人背了一包東西，那很可能，你正在承接對方承受不來的部分。

理解這點，不是為了責怪誰。而是讓我們能重新站穩自己：這不是我的情緒。我不需要替別人完成他尚未能面對的感受。我可以把界線放回來，把自己找回來。`

    content: `最近那位疑似因長期職場壓力而自殺的年輕公務員新聞，看了很難不難過。他不是第一個，也很可能不是最後一個。

    content: `她才十四歲。那天放學，在公車上被一個陌生男子摸了一把。她嚇壞了，回家哭著跟爸媽說。
