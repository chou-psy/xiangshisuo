<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香識所 · CHOULAB.SCENT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a040;
  --gold-l: #e8c878;
  --gold-d: #a07828;
  --ink: #f0ece4;
  --ink-s: rgba(240,236,228,0.6);
  --ink-m: rgba(240,236,228,0.35);
  --bg: #0a0e0c;
  --grid: rgba(180,145,80,0.07);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 48px 24px;
}

/* 格子背景 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* 中央暈染 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 0%,
    transparent 30%,
    rgba(10,14,12,0.5) 65%,
    rgba(10,14,12,0.92) 100%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* 品牌標題區 */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
  animation: fadeUp 0.9s ease both;
}

.brand-name {
  font-size: 42px;
  font-weight: 200;
  letter-spacing: 12px;
  text-align: center;
  color: var(--ink);
  line-height: 1;
}

.brand-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 4px;
  text-align: center;
  color: var(--gold);
  opacity: 0.7;
}

.brand-rule {
  width: 48px;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 4px 0;
}

.brand-tagline {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 1.5px;
  color: var(--ink-s);
  text-align: center;
  letter-spacing: 1px;
  line-height: 1.8;
}

/* 分隔 */
.section-rule {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  animation: fadeUp 0.9s 0.2s ease both;
}
.section-rule::before,
.section-rule::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(180,145,80,0.3));
}
.section-rule::after {
  background: linear-gradient(90deg, rgba(180,145,80,0.3), transparent);
}
.section-rule span {
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 3px;
  color: var(--ink-m);
  font-family: 'Cormorant Garamond', serif;
  white-space: nowrap;
}

/* 連結按鈕 */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 36px;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  border: 0.5px solid rgba(180,145,80,0.25);
  background: rgba(180,145,80,0.04);
  text-decoration: none;
  color: var(--ink);
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.9s ease both;
}

.link-btn:nth-child(1) { animation-delay: 0.3s; }
.link-btn:nth-child(2) { animation-delay: 0.4s; }
.link-btn:nth-child(3) { animation-delay: 0.5s; }

.link-btn::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 2px;
  height: 100%;
  background: linear-gradient(180deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

.link-btn:hover {
  border-color: rgba(180,145,80,0.5);
  background: rgba(180,145,80,0.08);
}
.link-btn:hover::before { opacity: 1; }

.link-icon {
  width: 36px;
  height: 36px;
  border: 0.5px solid rgba(180,145,80,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}

.link-info {
  flex: 1;
}

.link-title {
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--ink);
  margin-bottom: 3px;
}

.link-desc {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 1.5px;
  color: var(--ink-m);
}

.link-arrow {
  font-size: 12px;
  color: var(--gold);
  opacity: 0.5;
}

/* IG 連結 */
.ig-link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--ink-m);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 2.5px;
  transition: color 0.2s;
  animation: fadeUp 0.9s 0.6s ease both;
}
.ig-link:hover { color: var(--gold); }
.ig-link svg { opacity: 0.5; }

/* 底部 */
.footer {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: fadeUp 0.9s 0.7s ease both;
}
.footer-text {
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--ink-m);
  font-family: 'Cormorant Garamond', serif;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
